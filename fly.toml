app = "yusif-temir-tikinti-backend"
primary_region = "ams"

[build]

[deploy]
release_command = "python manage.py migrate --noinput"

[processes]
app = "gunicorn backend.wsgi:application --bind 0.0.0.0:8080"

[http_service]
internal_port = 8080
force_https = true
auto_stop_machines = true
auto_start_machines = true
min_machines_running = 0
processes = ["app"]
