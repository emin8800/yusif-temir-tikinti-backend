[deploy]
release_command = "python manage.py migrate --noinput && python manage.py initadmin"

app = "yusif-temir-tikinti-backend"
primary_region = "ams"
console_command = "/code/manage.py shell"

[build]

[env]
  PORT = "8000"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 256
